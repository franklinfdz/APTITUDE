<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude Platform</title>
  <link rel="stylesheet" href="/static/style.css">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a0a;
      overflow-x: hidden;
      color: #fff;
    }

    .main-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.04);
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(0,255,255,0.08);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 20px;
    }

    .home-img {
      width: 80px;
      margin-bottom: 18px;
      border-radius: 12px;
      opacity: 0.9;
    }

    input[type="text"], input[type="password"] {
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 15px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      outline: none;
      transition: 0.25s;
      font-size: 0.95rem;
    }

    input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0,255,255,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00ffff, #0099ff);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 0.95rem;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,255,255,0.2);
      color: #fff;
    }

    .error {
      color: #ff4d4d;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    /* 🔥 Background Effects */
    .bg-shape {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
    }

    .shape1 {
      background: rgba(0, 255, 255, 0.2);
      top: -100px;
      left: -100px;
    }

    .shape2 {
      background: rgba(255, 0, 255, 0.2);
      bottom: -100px;
      right: -100px;
    }

    .cursor-glow {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(0, 255, 255, 0.5);
      filter: blur(8px);
      z-index: 20;
      transform: translate(-50%, -50%);
    }

    canvas#particles {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    @media (max-width: 500px) {
      .main-container {
        width: 92%;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- 🔥 BACKGROUND -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  <div class="cursor-glow"></div>
  <canvas id="particles"></canvas>

  <!-- 🔥 LOGIN BOX -->
  <div class="main-container">

    <h1>Aptitude Platform</h1>
    <div class="subtitle">Structured Learning • Measurable Growth</div>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQm0AmfJ8QENqp9dbUYb2vuWT9pBygXkMdkdq90lEAREoriXGmHEvCtJ0L8&s=10" 
         alt="Aptitude" class="home-img">

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <!-- 🔥 FORM -->
    <form method="post">
      <input type="text" name="username" placeholder="Username" required autocomplete="off">
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Continue</button>
    </form>

  </div>

  <!-- 🔥 SCRIPTS -->
  <script>
    // Cursor Glow
    document.addEventListener("mousemove", (e) => {
      const glow = document.querySelector(".cursor-glow");
      if (glow) {
        glow.style.left = e.clientX + "px";
        glow.style.top = e.clientY + "px";
      }
    });

    // Particles
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();

    let particles = [];
    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.4,
        dy: (Math.random() - 0.5) * 0.4
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x > canvas.width) p.x = 0;
        if (p.x < 0) p.x = canvas.width;
        if (p.y > canvas.height) p.y = 0;
        if (p.y < 0) p.y = canvas.height;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(0,255,255,0.4)";
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', resizeCanvas);
  </script>

</body>
</html>
