<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/script.js" defer></script>

<style>
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  #timer {
    font-size: 1.2rem;
    font-weight: bold;
    color: #00ffff;
  }

  .xp-box {
    font-size: 1rem;
    opacity: 0.8;
  }

  .question {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
  }

  .question:hover {
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
  }

  label {
    display: block;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.2s;
  }

  label:hover {
    background: rgba(0,255,255,0.1);
  }

  input[type="radio"] {
    margin-right: 10px;
  }

  .correct {
    background: rgba(0,255,0,0.2);
  }

  .wrong {
    background: rgba(255,0,0,0.2);
  }

  .explanation-box {
    margin-top: 15px;
    padding: 15px;
    border-radius: 8px;
    background: rgba(0,0,0,0.5);
    display: none;
  }

  .level-buttons button {
    margin: 5px;
    padding: 6px 10px;
    font-size: 0.85rem;
  }

  .explanation-content {
    margin-top: 10px;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .submit-btn {
    padding: 12px 25px;
    font-size: 1rem;
  }
</style>

</head>

<body>

<div class="container">

<!-- 🔥 TOP BAR -->
<div class="top-bar">
  <h2 id="timer">Time: 60</h2>
  <div class="xp-box">XP Progress Active</div>
</div>

<form action="/submit" method="post">

{% for q in questions %}
<div class="question" data-id="{{ q.id }}">
  <p><b>{{ loop.index }}. {{ q.q }}</b></p>

  {% set q_index = loop.index0 %}

  {% for opt in q.options %}
  <label>
    <input 
      type="radio" 
      name="q{{ q_index }}" 
      value="{{ opt }}" 
      required
      onclick="checkAnswer({{ q.id }}, this.value, this)"
    >
    {{ opt }}
  </label>
  {% endfor %}

  <!-- Explanation Box -->
  <div class="explanation-box">
    
    <div class="level-buttons">
      <button type="button" onclick="showLevel(this, 'level1')">Level 1</button>
      <button type="button" onclick="showLevel(this, 'level2')">Level 2</button>
      <button type="button" onclick="showLevel(this, 'level3')">Level 3</button>
    </div>

    <div class="explanation-content"></div>
  </div>

</div>
{% endfor %}

<div class="center-buttons">
<button type="submit" class="submit-btn">Submit Test</button>
</div>

</form>

</div>

<!-- BACKGROUND SYSTEM -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="cursor-glow"></div>
<canvas id="particles"></canvas>

<script>
/* Cursor Glow */
document.addEventListener("mousemove", (e) => {
  const glow = document.querySelector(".cursor-glow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

/* Particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x > canvas.width) p.x = 0;
    if (p.x < 0) p.x = canvas.width;
    if (p.y > canvas.height) p.y = 0;
    if (p.y < 0) p.y = canvas.height;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.5)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
