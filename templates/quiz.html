<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<script src="/static/script.js" defer></script>

<style>
body{
    overflow-x: hidden;
    min-height:100vh;
}

/* CONTAINER */
.container {
    width: 95%;
    max-width: 1200px;
    margin: 10px auto;
    padding: 15px;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

#timer {
  font-size: 1.3rem;
  font-weight: bold;
  color: #00cfcf;
  text-shadow: 0 0 8px rgba(0,207,207,0.6);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

.xp-box {
  font-size: 0.95rem;
  opacity: 0.8;
}

/* QUESTION CARD */
.question {
  background: rgba(0,255,255,0.04);
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 12px;
  backdrop-filter: blur(12px);
  transition: 0.3s;
}

.question:hover {
  box-shadow: 0 0 20px rgba(0,200,200,0.25);
  transform: translateY(-2px);
}

/* OPTIONS */
label {
  display: block;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

label:hover {
  background: rgba(0,200,200,0.12);
}

input[type="radio"] {
  margin-right: 10px;
}

/* ANSWER STATES */
.correct {
  background: rgba(0,200,0,0.25);
}

.wrong {
  background: rgba(255,0,0,0.25);
}

/* EXPLANATION */
.explanation-box {
  margin-top: 15px;
  padding: 15px;
  border-radius: 8px;
  background: rgba(0,0,0,0.5);
  display: none;
}

.level-buttons {
  display: flex;
  flex-wrap: wrap;
}

.level-buttons button {
  margin: 5px;
  padding: 6px 10px;
  font-size: 0.8rem;
  background: #00cfcf;
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
}

/* SUBMIT BUTTON */
.submit-btn {
  padding: 14px 30px;
  font-size: 1rem;
  width: 100%;
  max-width: 300px;
  background: linear-gradient(45deg,#00cfcf,#009f9f);
  border: none;
  border-radius: 10px;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 10px rgba(0,207,207,0.4);
  transition: 0.2s;
}

/* 🔥 CLICK EFFECT */
.submit-btn:active {
  transform: scale(0.95);
}

/* 🔥 LOADING STATE */
.submit-btn.loading {
  background: #008080;
  color: #000;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    width: 100%;
    padding: 15px;
  }

  .top-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  #timer {
    margin-bottom: 5px;
  }
}
</style>

</head>

<body>

<div class="container">

<div class="top-bar">
  <h2 id="timer">Time: 90</h2>
  <div class="xp-box">XP Progress Active</div>
</div>

<form id="quizForm" action="/submit" method="post">

{% for q in questions %}
<div class="question" data-id="{{ q.id }}">

  <p><b>{{ loop.index }}. {{ q.q }}</b></p>

  {% set q_index = loop.index0 %}

  {% for opt in q.options %}
  <label>
    <input 
      type="radio" 
      name="q{{ q_index }}" 
      value="{{ opt }}" 
      required
      onclick="checkAnswer({{ q.id }}, this.value, this)"
    >
    {{ opt }}
  </label>
  {% endfor %}

  <div class="explanation-box">
    <div class="level-buttons">
      <button type="button" onclick="showLevel(this, 'level1')">Level 1</button>
      <button type="button" onclick="showLevel(this, 'level2')">Level 2</button>
      <button type="button" onclick="showLevel(this, 'level3')">Level 3</button>
    </div>

    <div class="explanation-content"></div>
  </div>

</div>
{% endfor %}

<div style="text-align:center;">
  <button type="submit" class="submit-btn" id="submitBtn">
    Submit Test
  </button>
</div>

</form>

</div>

<canvas id="particles"></canvas>

<script>

/* 🔥 SUBMIT LOADING UX */
document.getElementById("quizForm").addEventListener("submit", function() {
    const btn = document.getElementById("submitBtn");
    btn.classList.add("loading");
    btn.innerText = "Calculating XP...";
});

/* 🔥 PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x > canvas.width) p.x = 0;
    if (p.x < 0) p.x = canvas.width;
    if (p.y > canvas.height) p.y = 0;
    if (p.y < 0) p.y = canvas.height;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,200,200,0.5)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
window.addEventListener("resize", resizeCanvas);

</script>

</body>
</html>
