<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
}

body {
    padding-bottom: 70px;
}

/* 🔥 PREVENT BACKGROUND SCROLL WHEN POPUP */
body.popup-active {
    overflow: hidden;
}

.container {
    width: 100%;
    max-width: 500px;
    margin: 20px auto;
    padding: 20px;
    box-sizing: border-box;
}

.profile-header {
  text-align: center;
  margin-bottom: 20px;
}

.profile-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(45deg, #00ffff, #0072ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  margin: auto;
}

.stats-box {
  margin: 15px 0;
  padding: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
}

.xp-bar {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    overflow: hidden;
}

.xp-fill {
    height: 100%;
    width: 0%;
    border-radius: 20px;
    transition: width 1.5s ease-in-out;
    background: linear-gradient(90deg, #00ffcc, #00c6ff);
}

.rank-badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 20px;
  background: #00ffff;
  color: #000;
}

/* 🔥 FIXED POPUP */
.level-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  z-index: 9999;
}

.level-popup {
  width: 90%;
  max-width: 350px;
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  background: white;
  color: black;
}

#chart {
    width: 100% !important;
    max-height: 300px;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 70px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: black;
}
</style>
</head>

<body>

<div class="container">

<div class="profile-header">
  <div class="profile-avatar">{{ username[0]|upper }}</div>
  <div>{{ username }}</div>
  <div class="rank-badge">{{ rank }}</div>
</div>

<div class="stats-box">
  <p>XP: {{ xp }}</p>
  <p>Accuracy: {{ accuracy }}%</p>
</div>

<div>
  <p>Progress To Next Level</p>
  <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
</div>

<div class="stats-box">
  <p>Total Attempts: {{ attempts }}</p>
  <p>Total Score: {{ score }}</p>
</div>

<canvas id="chart"></canvas>

</div>

<!-- FIXED POPUP -->
<div id="levelUpOverlay" class="level-overlay">
  <div class="level-popup">
    <h2>Level Up 🚀</h2>
    <p>You Reached {{ rank }}</p>
    <button onclick="closeLevelPopup()">Continue</button>
  </div>
</div>

<div class="bottom-nav">
  <a href="/quiz">🧠</a>
  <a href="/profile">👤</a>
  <a href="/leaderboard">🏆</a>
  <a href="/logout">🚪</a>
</div>

<script>
window.onload = function () {

    const scores = {{ scores | tojson if scores else "[]" }};

    if (scores.length > 0) {
        const ctx = document.getElementById('chart').getContext('2d');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: scores.map((_, i) => "Attempt " + (i + 1)),
                datasets: [{
                    data: scores
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }

    const xp = {{ xp }};
    document.getElementById("xpFill").style.width = (xp % 100) + "%";

    {% if level_up %}
    document.getElementById("levelUpOverlay").style.display = "flex";
    document.body.classList.add("popup-active");
    {% endif %}
};

function closeLevelPopup() {
    document.getElementById("levelUpOverlay").style.display = "none";
    document.body.classList.remove("popup-active");
}
</script>

</body>
</html>
