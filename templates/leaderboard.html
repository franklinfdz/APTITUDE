<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">

<style>

/* 🔥 CONTAINER FIX */
.container {
  width: 100%;
  max-width: 768px;
  margin: 10px auto;
  padding: 15px;
}
  
/* 🔥 TITLE */
h1 {
  text-align: center;
  margin-bottom: 20px;
}

/* 🔥 LEADERBOARD */
.leaderboard-container {
  width: 100%;
}

/* 🔥 CARD */
.leader-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);

  box-shadow: 0 0 10px rgba(0,255,255,0.1);
  transition: all 0.25s ease;
  min-width:0;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.5s ease forwards;
}

/* 🔥 HOVER EFFECT */
.leader-card:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 0 25px rgba(0,255,255,0.25);
}

/* 🔥 RANK NUMBER */
.rank-number {
  font-size: 1.4rem;
  font-weight: bold;
  width: 45px;
}

/* 🔥 USER INFO */
.user-info {
  flex: 1;
  margin-left: 10px;
}

.user-info b {
  font-size: 1.1rem;
}

/* 🔥 STATS */
.user-stats {
  text-align: right;
  font-size: 0.9rem;
}

.leader-card:nth-child(1) { animation-delay: 0.05s; }
.leader-card:nth-child(2) { animation-delay: 0.1s; }
.leader-card:nth-child(3) { animation-delay: 0.15s; }
.leader-card:nth-child(4) { animation-delay: 0.2s; }
.leader-card:nth-child(5) { animation-delay: 0.25s; }

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 🔥 MOBILE NAV SPACING FIX */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;

  display: flex;
  justify-content: space-around;
  padding: 10px 0;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
}

/* Prevent Content Hidden Behind Navbar */
body {
  padding-bottom: 70px;
}

.page-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 20px 10px 80px;
}

@media (max-width: 600px)

  .rank-number {
    font-size: 1.2rem;
  }

  .user-info b {
    font-size: 1rem;
  }

  .user-stats {
    text-align: left;
    font-size: 0.85rem;
  }

}

* {
  box-sizing: border-box;
}

/* ================= RANK BADGE UPGRADE ================= */

.rank-badge {
  position: relative;
  padding: 5px 12px;
  border-radius: 20px;
  font-weight: bold;
  font-size: 0.8rem;
  display: inline-block;
  animation: badgePop 0.4s ease;
}

/* Tier Colors */
.rank-bronze {
  background: linear-gradient(45deg, #cd7f32, #a97142);
  color: #000;
}

.rank-silver {
  background: linear-gradient(45deg, #c0c0c0, #e0e0e0);
  color: #000;
}

.rank-gold {
  background: linear-gradient(45deg, #ffd700, #ffea70);
  color: #000;
}

.rank-platinum {
  background: linear-gradient(45deg, #00ffff, #00c6ff);
  color: #000;
}

.rank-diamond {
  background: linear-gradient(45deg, #00bfff, #66e0ff);
  color: #000;
}

.rank-master {
  background: linear-gradient(45deg, #ff00ff, #ff66ff);
  color: #000;
}

.rank-legend {
  background: linear-gradient(45deg, #ff4500, #ff8c00);
  color: #000;
  box-shadow: 0 0 10px rgba(255,140,0,0.7);
}

/* Badge Animation */
@keyframes badgePop {
  from {
    transform: scale(0.7);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* 🔥 TOP 3 SPECIAL GLOW */
.top1 {
  text-shadow: 0 0 8px gold;
}
.top2 {
  text-shadow: 0 0 6px silver;
}
.top3 {
  text-shadow: 0 0 6px #cd7f32;
}
  
</style>
</head>

<body>

<div class="container">

  <h1>🏆 Leaderboard</h1>

  <div class="leaderboard-container">

    {% if data|length == 0 %}
      <p style="text-align:center;">No Players Yet</p>
    {% else %}

      {% for user in data %}
      <div class="leader-card">

        <!-- Rank -->
        <div class="rank-number 
          {% if loop.index == 1 %}top1
          {% elif loop.index == 2 %}top2
          {% elif loop.index == 3 %}top3
          {% endif %}
        ">
          #{{ loop.index }}
        </div>

        <!-- Info -->
        <div class="user-info">
          <b>{{ user[0] }}</b><br>
          <span class="rank-badge 
  {% if 'Bronze' in user[3] %}rank-bronze
  {% elif 'Silver' in user[3] %}rank-silver
  {% elif 'Gold' in user[3] %}rank-gold
  {% elif 'Platinum' in user[3] %}rank-platinum
  {% elif 'Diamond' in user[3] %}rank-diamond
  {% elif 'Master' in user[3] %}rank-master
  {% elif 'Legend' in user[3] %}rank-legend
  {% endif %}
">
  {{ user[3] }}
</span>
        </div>

        <!-- Stats -->
        <div class="user-stats">
          <p>⚡ {{ user[1] }} XP</p>
          <p>📝 {{ user[2] }} Attempts</p>
        </div>

      </div>
      {% endfor %}

    {% endif %}

  </div>

</div>

<!-- 🔥 MOBILE NAVBAR -->
<div class="bottom-nav">
  <a href="/quiz">🧠</a>
  <a href="/profile">👤</a>
  <a href="/leaderboard">🏆</a>
  <a href="/logout">🚪</a>
</div>

<!-- BACKGROUND SYSTEM -->
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>
<div class="cursor-glow"></div>
<canvas id="particles"></canvas>

<!-- 🔥 BACKGROUND SCRIPT -->
<script>
document.addEventListener("mousemove", (e) => {
  const glow = document.querySelector(".cursor-glow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 3 + 1,
    dx: (Math.random() - 0.5) * 0.5,
    dy: (Math.random() - 0.5) * 0.5
  });
}

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});


function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    if (p.x > canvas.width) p.x = 0;
    if (p.x < 0) p.x = canvas.width;
    if (p.y > canvas.height) p.y = 0;
    if (p.y < 0) p.y = canvas.height;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0,255,255,0.5)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
